<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prode Mundial 2026</title>
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <header>
    <h1>Prode Mundial 2026</h1>
    <div id="status-bar"></div>
    <button class="reload-btn" onclick="location.reload(true)" title="Recargar">↺</button>
    <img src="./assets/m2.svg" alt="m2" class="header-logo">
  </header>

  <div id="error-banner"></div>

  <nav class="tabs">
    <button class="tab active" data-tab="ranking">Ranking</button>
    <button class="tab" data-tab="partidos">Partidos</button>
    <button class="tab" data-tab="grupos">Grupos</button>
    <button class="tab" data-tab="stats">Stats</button>
  </nav>

  <main>
    <div id="tab-ranking" class="tab-panel active">
      <div id="ranking-container"><p class="empty">Cargando…</p></div>
    </div>
    <div id="tab-partidos" class="tab-panel">
      <div id="partidos-container"><p class="empty">Cargando…</p></div>
    </div>
    <div id="tab-grupos" class="tab-panel">
      <div id="grupos-container"><p class="empty">Cargando…</p></div>
    </div>
    <div id="tab-stats" class="tab-panel">
      <div id="stats-container"><p class="empty">Tocá la solapa para cargar estadísticas.</p></div>
    </div>
  </main>

  <footer class="app-footer">
    <img src="./assets/2026_FIFA_World_Cup.svg" alt="FIFA World Cup 2026" class="wc-logo">
    <span class="version">v1.10.2</span>
  </footer>

  <script src="./assets/app.js"></script>
</body>
</html>
